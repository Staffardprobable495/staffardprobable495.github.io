name: "📝 Registration Form"
description: "Register for the 1st UK Functional Data Analysis Network Meeting"
title: "[Registration]: "
labels: ["registration"]
body:
  - type: markdown
    attributes:
      value: |
        Please fill out the form below to register.
        *Note: In-person places are strictly limited to 30/40 participants.*
  - type: input
    id: name
    attributes:
      label: Full Name
    validations:
      required: true
  - type: input
    id: email
    attributes:
      label: Email Address
    validations:
      required: true
  - type: input
    id: institution
    attributes:
      label: Institution / Affiliation
    validations:
      required: true
  - type: dropdown
    id: dietary
    attributes:
      label: Dietary Requirements
      description: "Note: All food provided on-site will have vegetarian or vegan options."
      options:
        - "None"
        - "Vegetarian"
        - "Vegan"
        - "Other"
    validations:
      required: true
